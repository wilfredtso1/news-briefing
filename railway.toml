# Railway web service configuration.
# See "Deploying to Railway" in CLAUDE.md for the full deployment guide,
# including cron service setup.

[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && cd web && npm install --legacy-peer-deps && npm run build && cd .. && cp -r web/dist static"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
